# @package model

_target_: src.models.ness_flow_module.NESSFlowMatchingModule

num_params: 1240          # 40 plucks × 31 dims
max_plucks: 40
params_per_pluck: 31
conditioning: mel
warmup_steps: 5000
cfg_dropout_rate: 0.1
rectified_sigma_min: 0.0
validation_sample_steps: 50
validation_cfg_strength: 2.0
test_sample_steps: 100
test_cfg_strength: 2.0
compile: false

# ── Audio encoder (AST) ──
encoder:
  _target_: src.models.transformer.AudioSpectrogramTransformer
  d_model: 512
  n_heads: 8
  n_layers: 8
  n_conditioning_outputs: 8     # one per DiT layer
  patch_size: 16
  patch_stride: 10
  input_channels: 2             # stereo
  spec_shape: [128, 401]

# ── Vector field (DiT + Param2Tok) ──
vector_field:
  _target_: src.models.transformer.ApproxEquivTransformer
  num_layers: 8
  d_model: 512
  conditioning_dim: 512
  num_heads: 8
  d_ff: 512
  num_tokens: 40                # one token per pluck slot (permutable)
  learn_pe: false
  learn_projection: true
  pe_type: none                 # no positional encoding = equivariant
  pe_penalty: 0.0
  time_encoding: sinusoidal
  d_enc: 256
  projection_penalty: 0.01     # L1 sparsity on assignment matrix
  norm: layer
  skip_first_norm: false
  adaln_mode: basic
  zero_init: true
  outer_residual: false

  # Param2Tok projection (LearntProjection)
  projection:
    _target_: src.models.transformer.LearntProjection
    d_model: 512
    d_token: 128
    num_params: ${model.num_params}     # 1240
    num_tokens: 40

# ── Optimizer ──
optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 1e-4

# ── Scheduler ──
scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 1000000
  eta_min: 1e-6